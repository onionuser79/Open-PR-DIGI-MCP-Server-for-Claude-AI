# Example node inventory for pr-digi-mcp — copy to ~/.config/pr-digi-mcp/nodes.yaml
# and edit for YOUR station. Passwords are NOT stored here (see credentials.yaml).
#
# Each node is keyed by its callsign. Supported `type` values:
#   xnet          (X)Net / PC-Flexnet-family telnet node
#   bpq | linbpq  BPQ32 (Windows) / LinBPQ (Linux) node
#   xnet_chained  a node reachable only by `C <call>` from another node
#
# CONNECTIVITY: `ssh_host` is OPTIONAL.
#   - set it  -> the telnet session is tunnelled through that SSH jump host
#                (the SSH alias must exist in your ~/.ssh/config)
#   - omit it -> connect DIRECTLY to telnet_host:telnet_port (same LAN, or a
#                node reachable over HAMNET / AMPRNet / the Internet)

nodes:

  # --- Direct connection (no SSH jump): node reachable straight over TCP ---
  N0CALL-7:
    type: xnet
    telnet_host: 192.0.2.10      # node IP or hostname
    telnet_port: 23
    user: youruser
    sys_required: true           # true if a SYS/PASSWORD is needed for write tools
    description: "(X)Net node — direct telnet"

  # --- Via an SSH jump host (telnet tunnelled over SSH) ---
  N0CALL-14:
    type: xnet
    ssh_host: my-gateway         # SSH alias in ~/.ssh/config
    telnet_host: 44.0.0.2        # address reachable *from the jump host*
    telnet_port: 23
    user: youruser
    sys_required: true
    description: "(X)Net node — via SSH jump host"

  # --- BPQ32 / LinBPQ node ---
  N0CALL-1:
    type: linbpq                 # or 'bpq' for BPQ32 on Windows
    telnet_host: 127.0.0.1       # e.g. localhost if the MCP runs on the BPQ host
    telnet_port: 2323
    user: youruser
    sys_required: true           # BPQ 'PASSWORD' elevation for sysop commands
    description: "LinBPQ node"

  # --- Chained node: reachable only via `C <call>` from a transit node ---
  N0CALL-12:
    type: xnet_chained
    transit_via: N0CALL-14       # must be another (non-chained) node above
    connect_command: "C N0CALL-12"
    sys_required: true           # SYS pwd on the INNER node (see credentials.yaml)
    sys_command: SY              # PC/Flexnet enters sysop mode with SY (not SYS)
    description: "PC/Flexnet node — chained via N0CALL-14"

  # --- Open node: no login prompt (login_required: false; `user` omitted) ---
  N0CALL-9:
    type: xnet
    telnet_host: 192.0.2.30
    telnet_port: 23
    login_required: false
    sys_required: false
    description: "(X)Net open node — connects straight to the prompt"

  # --- Multi-hop chain: transit_via points at ANOTHER chained node ---
  #   Path resolves to: base N0CALL-14  ->  C N0CALL-12  ->  C N0CALL-99
  N0CALL-99:
    type: xnet_chained
    transit_via: N0CALL-12       # itself chained (via N0CALL-14) — multi-hop OK
    connect_command: "C N0CALL-99"
    sys_required: true
    description: "PC/Flexnet node — 2 hops (via N0CALL-14 -> N0CALL-12)"

  # --- Island-interconnect gateway ---
  #   A gateway that links a whole external network (e.g. another country's
  #   FlexNet fabric) but advertises ONLY ITSELF to its neighbour — its
  #   downstream destinations are NOT re-exported. Automatic route discovery
  #   therefore sees just a cost-1 "self" entry and cannot reach it. Register
  #   it explicitly as xnet_chained so tools can run `D` / `N` etc. ON it and
  #   enumerate the full island behind it.
  IGATE:
    type: xnet_chained
    transit_via: N0CALL-14       # the neighbour that carries the cost-1 self route
    connect_command: "C IGATE"
    login_required: false        # open gateway — connects straight to the prompt
    sys_required: false          # read-only (D/N); no SYS on a foreign gateway
    description: "(X)Net island-interconnect gateway — chained via N0CALL-14"
