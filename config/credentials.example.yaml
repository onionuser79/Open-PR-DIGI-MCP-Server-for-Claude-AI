# Fallback credentials for pr-digi-mcp.
#
# PREFERRED: store secrets in your OS keyring under service 'pr-digi-mcp'
# (the `keyring` library works on macOS Keychain, Windows Credential Manager,
# and Linux Secret Service / KWallet). If a keyring lookup misses, this YAML
# file is consulted as a fallback.
#
# Copy to ~/.config/pr-digi-mcp/credentials.yaml with mode 0600 (chmod 600).
# NEVER commit real values — .gitignore blocks credentials.yaml.
#
# Per node: user_pwd (login password) and/or sys_pwd (SYS / PASSWORD for the
# write/sysop tools). Chained nodes inherit the transit node's login, so they
# need only sys_pwd.

nodes:
  N0CALL-14:
    user_pwd: "REPLACE_ME"
    sys_pwd:  "REPLACE_ME"

  N0CALL-1:
    user_pwd: "REPLACE_ME"
    sys_pwd:  "REPLACE_ME"

  # Chained node — login inherited from the transit node, so only sys_pwd.
  N0CALL-12:
    sys_pwd:  "REPLACE_ME"
